<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Sarayuu 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
}

/* COMMON PAGE */
.page{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
transition:opacity 0.8s ease;
padding:20px;
}

/* PAGE 1 */
#page1{
background:linear-gradient(135deg,#ffd6ec,#e0c3fc);
}

h1{
font-size:2.5rem;
font-weight:800;
text-shadow:0 0 20px pink;
}

p{
margin-top:15px;
font-size:1.2rem;
}

.buttons{
position:relative;
margin-top:50px;
width:320px;
height:150px;
}

button{
position:absolute;
padding:15px 35px;
font-size:1.1rem;
border:none;
border-radius:40px;
cursor:pointer;
transition:0.2s ease;
}

#yesBtn{
background:#ff4da6;
color:white;
left:30px;
top:60px;
}

#yesBtn:hover{
transform:scale(1.1);
}

#noBtn{
background:#888;
color:white;
right:30px;
top:60px;
}

/* LOADING SCREEN */
#loadingScreen{
background:black;
color:white;
font-size:2rem;
letter-spacing:3px;
opacity:0;
pointer-events:none;
}

.loading-text{
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:0.4;}
50%{opacity:1;}
100%{opacity:0.4;}
}

/* PAGE 2 */
#page2{
background:linear-gradient(135deg,#ffecd2,#fcb69f);
opacity:0;
pointer-events:none;
}

/* HEARTS */
.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* CONFETTI */
.confetti{
position:absolute;
width:8px;
height:8px;
animation:fall 3s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(100vh) rotate(360deg);}
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page" id="page1">
<h1>We are sorryyyyy Sarayuuuuuuuuuuu 💖🥺</h1>
<p>I believe you have forgiven us!!!!</p>

<div class="buttons">
<button id="yesBtn">YES 💕</button>
<button id="noBtn">NO 😤</button>
</div>
</div>

<!-- LOADING -->
<div class="page" id="loadingScreen">
<div class="loading-text">Loading Forgiveness... ⏳✨</div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
<h1>We knew it, you will forgive us!!!! 😭💗</h1>
<p>You're the best and we love you forever 💕</p>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const page1 = document.getElementById("page1");
const page2 = document.getElementById("page2");
const loading = document.getElementById("loadingScreen");
const buttonArea = document.querySelector(".buttons");

/* Keep NO inside container and escape from mouse */
buttonArea.addEventListener("mousemove", (e) => {

    const rect = noBtn.getBoundingClientRect();
    const areaRect = buttonArea.getBoundingClientRect();

    const mouseX = e.clientX;
    const mouseY = e.clientY;

    const btnCenterX = rect.left + rect.width / 2;
    const btnCenterY = rect.top + rect.height / 2;

    const distance = Math.hypot(mouseX - btnCenterX, mouseY - btnCenterY);

    if (distance < 100) {

        const maxX = areaRect.width - rect.width;
        const maxY = areaRect.height - rect.height;

        let newX = Math.random() * maxX;
        let newY = Math.random() * maxY;

        noBtn.style.left = newX + "px";
        noBtn.style.top = newY + "px";
    }
});

/* YES clicked */
yesBtn.addEventListener("click", () => {

    page1.style.opacity = "0";
    page1.style.pointerEvents = "none";

    loading.style.opacity = "1";
    loading.style.pointerEvents = "all";

    setTimeout(() => {

        loading.style.opacity = "0";
        loading.style.pointerEvents = "none";

        page2.style.opacity = "1";
        page2.style.pointerEvents = "all";

        createConfetti();
        createHearts();

    }, 2500);
});

/* CONFETTI */
function createConfetti(){
for(let i=0;i<120;i++){
const c=document.createElement("div");
c.classList.add("confetti");
c.style.left=Math.random()*100+"vw";
c.style.backgroundColor=
["#ff0","#ff69b4","#00f","#0f0","#f00"][Math.floor(Math.random()*5)];
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

/* HEARTS */
function createHearts(){
setInterval(()=>{
const h=document.createElement("div");
h.classList.add("heart");
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(Math.random()*20+15)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},400);
}
</script>

</body>
</html>
