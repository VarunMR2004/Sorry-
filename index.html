<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Sarayuu 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
height:100vh;
background:linear-gradient(135deg,#ffd6ec,#e0c3fc);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* TEXT */
h1{
font-size:2.5rem;
font-weight:800;
text-shadow:0 0 20px pink;
}

p{
margin-top:15px;
font-size:1.2rem;
}

/* YES BUTTON */
#yesBtn{
position:fixed;
bottom:25%;
left:40%;
padding:15px 35px;
font-size:1.1rem;
border:none;
border-radius:40px;
cursor:pointer;
background:#ff4da6;
color:white;
transition:0.2s ease;
z-index:10;
}

#yesBtn:hover{
transform:scale(1.1);
}

/* NO BUTTON (FREE FROM CONTAINER) */
#noBtn{
position:fixed;
padding:15px 35px;
font-size:1.1rem;
border:none;
border-radius:40px;
cursor:pointer;
background:#888;
color:white;
left:55%;
top:65%;
z-index:20;
}

/* LOADING SCREEN */
#loadingScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:2rem;
letter-spacing:3px;
opacity:0;
pointer-events:none;
transition:0.8s;
}

.loading-text{
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:0.4;}
50%{opacity:1;}
100%{opacity:0.4;}
}
</style>
</head>

<body>

<h1>We are sorryyyyy Sarayuuuuuuuuuuu 💖🥺</h1>
<p>I believe you have forgiven us!!!!</p>

<button id="yesBtn">YES 💕</button>
<button id="noBtn">NO 😤</button>

<div id="loadingScreen">
<div class="loading-text">Loading Forgiveness... ⏳✨</div>
</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const loading = document.getElementById("loadingScreen");

/* ESCAPE LOGIC */
document.addEventListener("mousemove", (e) => {

    const rect = noBtn.getBoundingClientRect();
    const mouseX = e.clientX;
    const mouseY = e.clientY;

    const btnCenterX = rect.left + rect.width / 2;
    const btnCenterY = rect.top + rect.height / 2;

    const distance = Math.hypot(mouseX - btnCenterX, mouseY - btnCenterY);

    if(distance < 140){

        const maxX = window.innerWidth - rect.width;
        const maxY = window.innerHeight - rect.height;

        let newX = Math.random() * maxX;
        let newY = Math.random() * maxY;

        noBtn.style.left = newX + "px";
        noBtn.style.top = newY + "px";
    }
});

/* YES CLICK */
yesBtn.addEventListener("click", () => {

    loading.style.opacity = "1";
    loading.style.pointerEvents = "all";

    setTimeout(() => {
        loading.innerHTML = "<div class='loading-text'>Forgiveness Accepted 😭💖</div>";
        setTimeout(() => {
            loading.style.opacity = "0";
        },1500);
    },2000);
});

</script>

</body>
</html>
